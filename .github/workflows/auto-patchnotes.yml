name: Auto Patchnotes

on:
  push:
    branches: [main]

jobs:
  generate-patchnotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deployment
        run: sleep 180

      - name: Generate patch notes
        env:
          APP_URL: ${{ secrets.APP_URL }}
          PATCHNOTES_SECRET: ${{ secrets.PATCHNOTES_SECRET }}
        run: node .github/scripts/generate-patchnotes.mjs
